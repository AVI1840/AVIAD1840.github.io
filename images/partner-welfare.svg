<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 90" width="260" height="90">
  <rect width="260" height="90" fill="white"/>
  <!-- Knot/infinity icon approximation -->
  <g transform="translate(200,45)">
    <ellipse cx="-12" cy="-10" rx="16" ry="10" fill="none" stroke="#4B5BD6" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="8" cy="-10" rx="16" ry="10" fill="none" stroke="#4B5BD6" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="-12" cy="10" rx="16" ry="10" fill="none" stroke="#6B7AE8" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="8" cy="10" rx="16" ry="10" fill="none" stroke="#6B7AE8" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="10" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1a1a2e" text-anchor="start">משרד הרווחה</text>
  <text x="10" y="48" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1a1a2e" text-anchor="start">והביטחון החברתי</text>
  <text x="10" y="64" font-family="Arial, sans-serif" font-size="10" fill="#4B5BD6" text-anchor="start">חוסן חברתי לישראל</text>
</svg>
