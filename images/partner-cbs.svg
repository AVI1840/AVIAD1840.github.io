<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">
  <!-- CBS geometric mark: angular shapes in 3 blues -->
  <g transform="translate(120, 72)">
    <!-- Dark navy outer left angular piece -->
    <polygon points="-48,50 -48,-10 -28,-50 -8,-50 -28,-10 -8,50" fill="#003F8A"/>
    <!-- Medium blue outer right angular piece -->
    <polygon points="8,-50 48,-50 48,50 8,50 28,10 28,-10" fill="#003F8A"/>
    <!-- Light sky-blue center diamond/arrow -->
    <polygon points="-8,-50 8,-50 28,-10 28,10 8,50 -8,50 -28,10 -28,-10" fill="#2B9ED4"/>
    <!-- Inner lighter highlight -->
    <polygon points="-8,-28 8,-28 18,-8 18,8 8,28 -8,28 -18,8 -18,-8" fill="#5BBFE8"/>
    <!-- Dark center diamond -->
    <polygon points="-5,-18 5,-18 12,-5 12,5 5,18 -5,18 -12,5 -12,-5" fill="#003F8A"/>
  </g>
  <!-- Text -->
  <text x="120" y="142" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#003F8A" text-anchor="middle">הלשכה המרכזית לסטטיסטיקה</text>
</svg>
